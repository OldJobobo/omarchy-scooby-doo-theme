# Scooby-Doo shell surfaces.
# Dark mystery panels, Mystery Machine teal focus, and snack-yellow text over
# the wallpaper set's warm shadows.

[bar]
background       = "#21130e"
background-alpha = 0.86
text             = "#f9cd71"
active           = "#e75057"
scale-with-font  = true
size-horizontal  = 26
size-vertical    = 28

[hyprland]
active-border            = "rgb(8af3d1) rgb(ffef93) rgb(ffa63e) rgb(45b193) 35deg"
active-border-foreground = "rgb(ffef93) rgb(8af3d1) rgb(ffa63e) 35deg"

[controls]
normal-color        = "#f9cd71"
normal-fill-alpha   = 0.025
normal-border       = "#6e442a"
normal-border-width = 1
normal-border-alpha = 0.28

hover-cursor-color        = "#ffef93"
hover-cursor-fill-alpha   = 0.055
hover-cursor-border       = "hyprland.active-border"
hover-cursor-border-width = 2
hover-cursor-border-alpha = 0.70

focus-color        = "#ffef93"
focus-fill-alpha   = 0.080
focus-border       = "hyprland.active-border"
focus-border-width = 2
focus-border-alpha = 0.86

selected-color        = "#8af3d1"
selected-fill-alpha   = 0.16
selected-border       = "hyprland.active-border"
selected-border-width = "0 0 1 0"
selected-border-alpha = 0.74

pressed-color        = "#ffa63e"
pressed-fill-alpha   = 0.18
selection-color      = "#45b193"
selection-fill-alpha = 0.34

[spacing]
scale = 0.96
scale-with-font = true
control-gap = 7
control-padding-x = 10
control-padding-y = 5
input-padding-y = 6
control-height = 27
popup-row-height = 28
row-gap = 6
row-padding-x = 12
label-gap = 4
panel-gap = 13
panel-padding = 17
popup-padding = 13
dropdown-width = 244
searchable-dropdown-width = 264
number-field-width = 120
searchable-popup-min-height = 222

[font]
base-size = 12
caption = 10
body-small = 11
body = 12
subtitle = 13
title = 14
heading = 16
display = 24
display-large = 28
icon-small = 11
icon = 14
icon-large = 18

[popups]
background       = "#21130e"
background-alpha = 0.94
text             = "#f9cd71"
border           = "hyprland.active-border"
border-alpha     = 0.82
border-width     = 2

[tooltip]
background       = "#21130e"
background-alpha = 0.97
text             = "#ffef93"
border           = "hyprland.active-border-foreground"
border-alpha     = 0.80

[notifications]
background       = "#21130e"
background-alpha = 0.95
text             = "#f9cd71"
border           = "hyprland.active-border"
border-alpha     = 0.88
border-width     = 2
countdown        = "#fa8601"

[launcher]
background                 = "#21130e"
background-alpha           = 0.92
text                       = "#ce853b"
border                     = "hyprland.active-border"
border-alpha               = 0.70
border-width               = 2
scrim                      = "#140c08"
scrim-alpha                = 0.62
selected-background        = "#45b193"
selected-background-alpha  = 0.22
selected-text              = "#ffef93"
selected-border            = "hyprland.active-border-foreground"
selected-border-alpha      = 0.86
selected-border-width      = "0 0 1 0"

[menu]
background                 = "#21130e"
background-alpha           = 0.93
text                       = "#ce853b"
border                     = "hyprland.active-border"
border-alpha               = 0.66
border-width               = 2
scrim                      = "#140c08"
scrim-alpha                = 0.58
selected-background        = "#45b193"
selected-background-alpha  = 0.18
selected-text              = "#ffef93"
selected-border            = "hyprland.active-border-foreground"
selected-border-alpha      = 0.82
selected-border-width      = "0 0 1 0"

[polkit]
background       = "#21130e"
background-alpha = 0.98
text             = "#ffef93"
text-error       = "#e75057"
border           = "hyprland.active-border"
border-error     = "#e75057"
border-alpha     = 0.90
scrim            = "#140c08"
scrim-alpha      = 0.70
accent           = "#45b193"

[lock]
background       = "#21130e"
background-alpha = 0.82
text             = "#f9cd71"
placeholder      = "#a76104"
text-error       = "#e75057"
border           = "hyprland.active-border"
border-active    = "hyprland.active-border"
border-error     = "#e75057"
border-alpha     = 0.86
selection        = "#45b193"
selection-alpha  = 0.45

[image-picker]
scrim                   = "#140c08"
scrim-alpha             = 0.62
text                    = "#ffef93"
selected-border         = "#45b193"
selected-border-alpha   = 1.0
unselected-border       = "hyprland.active-border"
unselected-border-alpha = 0.48

